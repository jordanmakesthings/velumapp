<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velum · Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#0F2F26;--fl:#1a4a3a;--ch:#111111;--cr:#F2EFE7;--sg:#6F8A7E;--gd:#C9A84C;--mt:#c8c4bb;--dm:#9aaea3;--br:#2a2a2a;--sf:#181818;--s2:#1e1e1e;--red:#c97c5c}
html,body{height:100%;background:#0d0d0d;color:var(--cr);font-family:'DM Sans',sans-serif;font-weight:300}

/* ── AUTH GATE ── */
#auth{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:999}
.auth-box{text-align:center;width:280px}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:.4em;color:var(--cr);opacity:.8;margin-bottom:6px}
.auth-logo span{color:var(--gd)}
.auth-sub{font-size:10px;letter-spacing:.2em;color:var(--sg);text-transform:uppercase;margin-bottom:32px}
.auth-box input{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:4px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:12px 16px;outline:none;text-align:center;letter-spacing:.3em;margin-bottom:12px;transition:border-color .2s}
.auth-box input:focus{border-color:var(--gd)}
.auth-box button{width:100%;background:var(--gd);color:var(--ch);border:none;border-radius:3px;padding:12px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;cursor:pointer}
.auth-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-columns:320px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--br);background:#0d0d0d}
.logo{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:300;letter-spacing:.35em;color:var(--cr);opacity:.8}
.logo span{color:var(--gd)}
.htag{font-size:9px;font-weight:400;letter-spacing:.2em;color:var(--sg);text-transform:uppercase}

/* ── SIDEBAR ── */
.sidebar{border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;background:var(--sf)}
.si{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.si::-webkit-scrollbar{width:3px}
.si::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
label{display:block;font-size:9px;font-weight:400;letter-spacing:.2em;color:var(--sg);text-transform:uppercase;margin-bottom:6px}
textarea,select,input[type=text],input[type=password]{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:4px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;padding:9px 11px;outline:none;resize:none;transition:border-color .2s}
textarea:focus,select:focus,input:focus{border-color:var(--gd)}
textarea{line-height:1.6}
select{cursor:pointer;appearance:none}
select option{background:#1e1e1e}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--sg);font-size:10px;pointer-events:none}
.mt{display:flex;border:1px solid var(--br);border-radius:4px;overflow:hidden}
.mb{flex:1;padding:8px 0;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s}
.mb.on{background:var(--gd);color:var(--ch);font-weight:500}
.mb.off{background:var(--s2);color:var(--sg)}
.gbtn{width:100%;background:var(--gd);color:var(--ch);border:none;border-radius:3px;padding:11px;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.gbtn:hover{opacity:.88}
.gbtn:disabled{opacity:.35;cursor:default}
.div{border:none;border-top:1px solid var(--br)}
.hint{font-size:10px;color:var(--sg);margin-top:6px;line-height:1.6;opacity:.8}
.rbtn{background:transparent;border:1px solid var(--br);border-radius:3px;color:var(--sg);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:6px 11px;cursor:pointer;transition:all .2s;align-self:flex-start}
.rbtn:hover{border-color:var(--gd);color:var(--cr)}

/* ── SLIDE CARDS ── */
.slist{display:flex;flex-direction:column;gap:8px}
.secard{background:var(--s2);border:1px solid var(--br);border-radius:6px;overflow:hidden;transition:border-color .2s}
.secard.current{border-color:rgba(201,168,76,.5)}
.sehdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none}
.sehdr:hover{background:rgba(255,255,255,.03)}
.snum{font-size:9px;font-weight:500;letter-spacing:.15em;color:var(--gd);text-transform:uppercase;min-width:18px}
.stlbl{font-size:11px;color:var(--dm);flex:1}
.card-bg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.chv{font-size:9px;color:var(--sg);transition:transform .2s;flex-shrink:0}
.secard.open .chv{transform:rotate(180deg)}
.sebdy{display:none;padding:12px;flex-direction:column;gap:10px}
.secard.open .sebdy{display:flex}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{margin-bottom:0}

/* Quick bg strip in card header */
.card-bgstrip{display:flex;gap:5px;padding:10px 12px;background:rgba(0,0,0,.2);flex-wrap:wrap;border-top:1px solid var(--br)}
.bgsw{width:28px;height:28px;border-radius:5px;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.bgsw:hover{border-color:var(--sg);transform:scale(1.1)}
.bgsw.sel{border-color:var(--gd)!important;box-shadow:0 0 0 1px var(--gd);transform:scale(1.08)}

/* Delete button */
.del-btn{width:100%;padding:7px;background:none;border:1px solid rgba(201,124,92,.25);border-radius:3px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.del-btn:hover{border-color:var(--red);background:rgba(201,124,92,.08)}

/* Add slide row */
.add-row{display:flex;flex-wrap:wrap;gap:5px;padding:10px 0 4px}
.add-row-lbl{font-size:9px;letter-spacing:.18em;color:var(--sg);text-transform:uppercase;width:100%;margin-bottom:2px}

/* Sbar */
.sbar{padding:10px 16px;border-top:1px solid var(--br);font-size:10px;color:var(--sg);min-height:38px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--sg);flex-shrink:0}
.sdot.on{background:var(--gd);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Logo + download area */
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.logo-preview{width:100%;height:40px;border:1px dashed #333;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sg);font-size:10px;letter-spacing:.08em;position:relative;overflow:hidden}
.logo-preview img{max-height:30px;max-width:120px;object-fit:contain}
.dload-btn{background:transparent;border:1px solid var(--br);border-radius:3px;color:var(--sg);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;width:100%;text-align:center}
.dload-btn:hover{border-color:var(--gd);color:var(--gd)}

/* ── FORMAT BAR ── */
.fbar{display:flex;align-items:center;gap:5px;padding:8px 14px;background:#161616;border-bottom:1px solid #222;flex-shrink:0;flex-wrap:wrap}
.fbar-label{font-size:9px;letter-spacing:.18em;color:var(--sg);text-transform:uppercase;margin-right:2px}
.fbar button{background:none;border:1px solid #2a2a2a;border-radius:3px;color:var(--mt);cursor:pointer;font-size:11px;padding:4px 9px;font-family:'DM Sans',sans-serif;transition:all .15s}
.fbar button:hover{border-color:var(--gd);color:var(--cr)}
.fbar .fsep{width:1px;height:16px;background:#2a2a2a;margin:0 1px}
.fbar .fcolor{width:22px;height:22px;border-radius:3px;border:1px solid #2a2a2a;cursor:pointer;padding:2px;background:#1e1e1e}
.fbar .fcolor-swatch{width:16px;height:16px;border-radius:2px;cursor:pointer;border:none;outline:none}
.fbar .hint-text{font-size:9px;color:var(--sg);font-style:italic;margin-left:2px}

/* ── CANVAS ── */
.canvas-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.canvas{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:auto;padding:32px;background:#0d0d0d;flex:1}

/* ── SLIDE CONTAINER ── */
.sc{position:relative;width:480px;height:480px;flex-shrink:0;border-radius:2px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.05),0 20px 60px rgba(0,0,0,.7);transition:width .2s,height .2s}
.sc.portrait{width:384px;height:480px}
.sc.story{width:270px;height:480px}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:44px;background:var(--ch);overflow:hidden}
.slide.active{display:flex}
.slide svg{max-width:100%;height:auto;display:block}
.slide .bfg{max-width:380px}
.slide.light .sey,.slide.light .sst,.slide.light .sbd,.slide.light .sen,.slide.light .ses,.slide.light .sch,.slide.light .scb{color:#222!important}
.slide.light .shl{color:#111!important}
.slide.light .wm{color:#6F8A7E!important;opacity:.4}
.slide.light .srl{background:#8B6B20}
.slide.light .bgr,.slide.light .bgl{background:none!important}

/* Slide text styles */
.cm{position:absolute;top:16px;right:18px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;color:var(--sg);letter-spacing:.08em;opacity:.6}
.wm{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:9px;font-weight:300;letter-spacing:.32em;color:var(--sg);opacity:.5;white-space:nowrap}
.sey{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:var(--gd);margin-bottom:14px;position:relative;text-align:center}
.shl{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;line-height:1.15;color:var(--cr);text-align:center;position:relative;max-width:360px}
.shl em{font-style:italic;color:var(--gd)}
.srl{width:28px;height:1px;background:var(--gd);margin:18px auto 0;opacity:.6;position:relative}
.sst{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:.12em;color:var(--sg);text-align:center;margin-top:10px;position:relative}
.sbd{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;line-height:1.8;color:var(--mt);text-align:center;max-width:340px;position:relative}
.set{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.25em;color:var(--gd);text-transform:uppercase;margin-bottom:6px;position:relative}
.sen{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--cr);margin-bottom:4px;position:relative}
.ses{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:.1em;color:var(--sg);margin-bottom:18px;position:relative}
.sch{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;line-height:1.3;color:var(--cr);text-align:center;max-width:320px;margin-bottom:16px;position:relative}
.scb{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;line-height:1.75;color:var(--dm);text-align:center;max-width:290px;margin-bottom:22px;position:relative}
.sln{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.18em;color:var(--gd);text-transform:uppercase;position:relative}
/* Quote type */
.sqm{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;line-height:.5;color:var(--gd);opacity:.4;margin-bottom:8px}
.sqt{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;font-style:italic;line-height:1.4;color:var(--cr);text-align:center;max-width:340px;position:relative}
.sqa{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.22em;color:var(--gd);text-transform:uppercase;margin-top:16px;position:relative;text-align:center}
/* List type */
.sli-wrap{display:flex;flex-direction:column;gap:10px;max-width:340px;width:100%;position:relative}
.sli{display:flex;align-items:flex-start;gap:10px}
.sli-dot{width:5px;height:5px;border-radius:50%;background:var(--gd);flex-shrink:0;margin-top:6px;opacity:.8}
.sli-text{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;line-height:1.65;color:var(--mt)}

/* Phone mockup */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%}
.phone-frame{width:164px;height:330px;background:#0a0a0a;border:1.5px solid #333;border-radius:36px;position:relative;flex-shrink:0;box-shadow:0 0 0 1px #1a1a1a,0 24px 60px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.04)}
.phone-island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:52px;height:9px;background:#000;border-radius:8px;z-index:3}
.phone-screen{position:absolute;inset:3px;border-radius:33px;overflow:hidden;background:#111}
.phone-screen img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.phone-screen-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:10px;letter-spacing:.08em;text-align:center;padding:12px;line-height:1.5}
.phone-upload-btn{background:none;border:1px dashed #333;border-radius:4px;color:var(--sg);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;width:100%;text-align:center}
.phone-upload-btn:hover{border-color:var(--gd);color:var(--gd)}

/* Draggable elements */
.dw{position:relative;display:block}
.dh{position:absolute;top:2px;right:2px;color:var(--sg);font-size:11px;cursor:grab;opacity:0;transition:opacity .15s;user-select:none;line-height:1;z-index:10;background:rgba(0,0,0,.45);border-radius:2px;padding:1px 4px;letter-spacing:0}
.dw:hover .dh{opacity:.7}
.dh:hover{opacity:1!important;color:var(--gd)}
.dh:active{cursor:grabbing}
.is-dragging{position:absolute!important;z-index:50;opacity:.85;outline:1px dashed rgba(201,168,76,.4)}
.snap-guide{position:absolute;pointer-events:none;z-index:100;opacity:0;transition:opacity .1s}
.snap-guide.h{left:0;right:0;height:1px;background:rgba(201,168,76,.5)}
.snap-guide.v{top:0;bottom:0;width:1px;background:rgba(201,168,76,.5)}
.snap-guide.show{opacity:1}

/* Bg overlays */
.bgr{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#1a4a3a 0%,#111111 70%)}
.bgl{position:absolute;inset:0;background:linear-gradient(155deg,#0F2F26 0%,#111111 55%)}
.bfg{display:flex;gap:20px;align-items:flex-end;position:relative}
.bfc{display:flex;flex-direction:column;align-items:center;gap:6px}
.bfl{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:400;letter-spacing:.15em}
.bfl.s{color:#c97c5c}
.bfl.c{color:var(--sg)}
.dv{width:1px;height:40px;background:#2a2a2a;align-self:center}

/* ── QUICK ACTIONS BAR ── */
.qbar{display:flex;align-items:center;gap:6px;padding:6px 0}
.qbtn{background:var(--s2);border:1px solid var(--br);border-radius:3px;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.qbtn:hover:not(:disabled){border-color:var(--gd);color:var(--cr)}
.qbtn:disabled{opacity:.25;cursor:default}
.qbtn.del{color:var(--red);border-color:rgba(201,124,92,.25)}
.qbtn.del:hover{border-color:var(--red);background:rgba(201,124,92,.08)}
.qsep{width:1px;height:16px;background:var(--br);margin:0 2px}
.qct{font-size:10px;color:var(--sg);letter-spacing:.08em;min-width:64px;text-align:center}

/* ── GFX PICKER ── */
.gfx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-height:200px;overflow-y:auto;padding:1px}
.gfx-grid::-webkit-scrollbar{width:3px}
.gfx-grid::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.gfx-thumb{background:var(--forest);border:1px solid var(--br);border-radius:4px;padding:4px 3px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .15s;overflow:hidden}
.gfx-thumb:hover{border-color:var(--sg)}
.gfx-thumb.sel{border-color:var(--gd)}
.gfx-thumb svg{width:100%!important;height:44px;display:block;pointer-events:none}
.gfx-thumb .bfg{width:100%;height:44px;overflow:hidden;display:flex;align-items:center;justify-content:center;pointer-events:none}
.gfx-thumb .bfg svg{height:34px;pointer-events:none}
.gfx-lbl{font-size:7px;color:var(--sg);text-align:center;letter-spacing:.03em;line-height:1.3;pointer-events:none}
.gfx-sel-lbl{font-size:9px;color:var(--gd);letter-spacing:.08em;margin-bottom:5px}

/* ── EMPTY STATE ── */
.es{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.eg{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:var(--fl);line-height:1}
.et{font-size:11px;color:var(--sg);letter-spacing:.04em;line-height:1.7;max-width:240px}

/* ── NAV DOTS ── */
.snav{display:flex;align-items:center;gap:12px}
.nb{width:30px;height:30px;border-radius:50%;border:1px solid var(--br);background:var(--sf);color:var(--cr);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.nb:hover{border-color:var(--gd)}
.nb:disabled{opacity:.2;cursor:default}
.dots{display:flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#333;cursor:pointer;transition:background .2s,width .2s}
.dot.active{background:var(--gd);width:12px;border-radius:3px}
.sct{font-size:10px;color:var(--sg);letter-spacing:.1em;min-width:40px;text-align:center}

/* ── SESSIONS ── */
.sess-row{display:flex;gap:5px}
.sess-row input{flex:1}
.sess-row .rbtn{flex-shrink:0;white-space:nowrap}

/* Caption textarea */
#caption-out{font-size:11px;line-height:1.7;margin-top:6px;color:var(--mt)}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">V<span>E</span>LUM</div>
    <div class="auth-sub">Content Studio</div>
    <input type="password" id="pw" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Enter</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div class="app" id="app" style="display:none">
<header>
  <div class="logo">V<span>E</span>LUM</div>
  <div class="htag">Content Studio</div>
  <button id="tt-btn" onclick="toggleTTMode()" style="font-size:9px;letter-spacing:.15em;color:var(--sg);text-transform:uppercase;background:none;border:1px solid var(--br);border-radius:2px;padding:5px 10px;cursor:pointer;transition:all .2s">TikTok Mode</button>
</header>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="si">

    <!-- API Key -->
    <div>
      <label>Anthropic API Key</label>
      <input type="password" id="akey" placeholder="sk-ant-…" autocomplete="off">
      <div class="hint">Saved locally only.</div>
    </div>
    <hr class="div">

    <!-- Sessions -->
    <div>
      <label>Sessions</label>
      <div class="sess-row" style="margin-bottom:5px">
        <input type="text" id="sess-name" placeholder="Session name">
        <button class="rbtn" onclick="saveSession()">Save</button>
      </div>
      <div class="sess-row">
        <div class="sw" style="flex:1"><select id="sess-load"><option value="">Load…</option></select></div>
        <button class="rbtn" onclick="loadSession()">Load</button>
        <button class="rbtn" onclick="deleteSession()" style="color:var(--red);border-color:rgba(201,124,92,.3)">Del</button>
      </div>
    </div>
    <hr class="div">

    <!-- Mode + inputs -->
    <div class="mt">
      <button class="mb on" id="mg" onclick="setMode('gen')">Generate</button>
      <button class="mb off" id="ms" onclick="setMode('script')">My Script</button>
    </div>
    <div id="gf">
      <div style="margin-bottom:10px">
        <label>Topic</label>
        <textarea id="topic" placeholder="e.g. 3 signs your nervous system is dysregulated" rows="3"></textarea>

<script>
// ── AUTH ──
const PASS_HASH='!Wealthy8';
function checkPw(){
  const v=document.getElementById('pw').value;
  if(v===PASS_HASH||localStorage.getItem('velum_auth')===PASS_HASH){
    localStorage.setItem('velum_auth',PASS_HASH);
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='grid';
    init();
  }else{
    document.getElementById('auth-err').textContent='Incorrect password.';
  }
}
// Auto-login if already authenticated
if(localStorage.getItem('velum_auth')===PASS_HASH){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='grid';
}

// ── STATE ──
const AAPI='https://api.anthropic.com/v1/messages';
let slides=[],cur=0,mode='gen';

function saveSlides(){try{localStorage.setItem('velum_slides',JSON.stringify({slides,cur}));}catch(e){}}
function loadSlides(){try{const d=JSON.parse(localStorage.getItem('velum_slides'));if(d?.slides?.length){slides=d.slides;cur=d.cur||0;return true;}}catch(e){}return false;}

function init(){
  const k=localStorage.getItem('velum_key')||'';
  if(k)document.getElementById('akey').value=k;
  if(loadSlides()){render();renderEds();goTo(cur);}
  loadSessionList();
  renderCTATemplates();
}
if(localStorage.getItem('velum_auth')===PASS_HASH){document.addEventListener('DOMContentLoaded',init);}

// ── MODE ──
function setMode(m){
  mode=m;
  document.getElementById('gf').style.display=m==='gen'?'block':'none';
  document.getElementById('sf').style.display=m==='script'?'block':'none';
  document.getElementById('mg').className='mb '+(m==='gen'?'on':'off');
  document.getElementById('ms').className='mb '+(m==='script'?'on':'off');
  document.getElementById('gbtn').textContent=m==='script'?'Format My Script':'Generate Carousel';
}

function st(txt,active=false){
  document.getElementById('stxt').textContent=txt;
  document.getElementById('sdot').className='sdot'+(active?' on':'');
}

// ── API ──
async function api(sys,usr){
  const key=document.getElementById('akey').value.trim();
  if(key)localStorage.setItem('velum_key',key);
  const r=await fetch(AAPI,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,system:sys,messages:[{role:'user',content:usr}]})});
  if(!r.ok)throw new Error('API error '+r.status);
  const d=await r.json();return d.content[0].text;
}

const BRAND=`You write Instagram carousel copy for Velum, a wellness app for nervous system regulation, breathwork, meditation, EFT tapping, somatic practices, and self-hypnosis. Voice: quiet, introspective, slightly philosophical. Serious and effective. No fluff, no generic warmth, no motivational clichés.`;
const SCH=`Respond with ONLY a valid JSON array. No preamble, no backticks, no markdown.
Slide types:
- "hook": {type:"hook", eyebrow, headline, subtext}
- "why": {type:"why", eyebrow, headline, body, graphic:"wave"|"window"|"ladder"|"states"|"neural"|"mindbody"}
- "exercise": {type:"exercise", num, name, subtitle, graphic:"box"|"wave478"|"circle"|"wave"|"eft"|"bodyscan"}
- "concept": {type:"concept", eyebrow, headline, body, graphic:"iceberg"|"habitloop"|"beliefs"|"spiral"|"none"}
- "quote": {type:"quote", quote, attribution}
- "cta": {type:"cta", headline, body, nudge:"link in bio"}
Rules: first=hook, last=cta. Short copy. App has breathwork, meditation, EFT tapping, somatic practices, self-hypnosis only.`;
const SCH1=`Respond with ONLY a valid JSON object for one slide. No preamble, no backticks.
Types: hook={eyebrow,headline,subtext}, why={body,graphic}, exercise={num,name,subtitle,graphic}, concept={eyebrow,headline,body,graphic}, quote={quote,attribution}, cta={headline,body,nudge}`;

// ── GENERATE ──
async function go(){
  const key=document.getElementById('akey').value.trim();
  if(key)localStorage.setItem('velum_key',key);
  if(!key){st('Paste your API key first.');return;}
  const btn=document.getElementById('gbtn');btn.disabled=true;
  try{
    let raw;
    const activeBrand=ttMode?TT_BRAND:BRAND;
    const activeSCH=ttMode?TT_SCH:SCH;
    if(mode==='script'){
      const sc=document.getElementById('script').value.trim();
      if(!sc){st('Paste your script first.');btn.disabled=false;return;}
      st('Formatting your script…',true);
      raw=await api(activeBrand+'\n\nMap the user\'s script FAITHFULLY into carousel JSON. Use their EXACT words verbatim. Do not rewrite.\n\n'+activeSCH,'Map this script:\n\n'+sc);
    }else{
      const topic=document.getElementById('topic').value.trim();
      if(!topic){st('Enter a topic first.');btn.disabled=false;return;}
      const count=parseInt(document.getElementById('scount').value);
      const ang=document.getElementById('angle').value;
      const tone=document.getElementById('tone').value;
      const toneMap={poetic:'Write with quiet, poetic introspection.',clinical:'Write with clinical precision and evidence-based framing.',direct:'Write clearly and directly. No metaphors.',grounded:'Write in warm, embodied, somatic language.'};
      const amap={educational:'teach clearly',howto:'step-by-step guide',myth:'myth-busting',signs:'signs and symptoms',benefits:'why it matters',story:'story arc from struggle to insight'};
      st(ttMode?'Generating TikTok carousel…':'Generating carousel…',true);
      raw=await api(activeBrand+'\n'+(ttMode?'':toneMap[tone]+'\n')+'\n'+activeSCH,`Topic: "${topic}"\nAngle: ${amap[ang]}\nSlides: ${ttMode?Math.min(count,7):count}\n\nGenerate exactly ${ttMode?Math.min(count,7):count} slides.`);
      if(ttMode)setDims('portrait');
    }
    const clean=raw.replace(/```json|```/g,'').trim();
    slides=JSON.parse(clean);cur=0;saveSlides();
    render();renderEds();goTo(0);
    st(`${slides.length} slides ready — click text on slide to edit directly`,false);
  }catch(e){st('Error: '+e.message,false);console.error(e);}
  btn.disabled=false;
}

async function regen(idx){
  const key=document.getElementById('akey').value.trim();
  if(!key){st('Paste your API key first.');return;}
  const s=slides[idx];
  const topic=document.getElementById('topic').value.trim()||'the current topic';
  st('Regenerating slide '+(idx+1)+'…',true);
  try{
    const raw=await api(BRAND+'\n\n'+SCH1,`Regenerate slide (type:"${s.type}") for topic:"${topic}". Fresh take, same type.`);
    const ns=JSON.parse(raw.replace(/```json|```/g,'').trim());
    ns.type=s.type;slides[idx]={...slides[idx],...ns};saveSlides();
    render();renderEds();goTo(idx);
    st('Slide '+(idx+1)+' regenerated',false);
  }catch(e){st('Regen error: '+e.message,false);}
}

// ── RENDER SLIDE ──
function dw(html){return html?`<div class="dw"><span class="dh" title="Drag">⠿</span>${html}</div>`:''}

const LIGHT_BGS=['#F2EFE7','#e8e4db','linear-gradient(180deg,#F2EFE7,#e8e4db)','#6F8A7E'];

function bslide(s,i){
  const el=document.createElement('div');
  el.className='slide';el.id='sl'+i;
  const bg=s.bg||'#111111';
  el.style.background=bg;
  if(LIGHT_BGS.includes(bg))el.classList.add('light');
  const cm=`<div class="cm">${String(i+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</div>`;
  const wm=`<div class="wm">V E L U M</div>`;
  const gr=s.graphic&&s.graphic!=='none'?dw(gfx(s.graphic)):'';
  const t=s.type;
  let inner='';
  if(t==='hook')inner=`<div class="bgr"></div>${cm}${dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow||'breathwork'}</div>`)}${dw(`<div class="shl" contenteditable="true" data-field="headline">${s.headline||''}</div>`)}${dw(`<div class="srl"></div>`)}${dw(`<div class="sst" contenteditable="true" data-field="subtext">${s.subtext||''}</div>`)}${gr}${wm}`;
  else if(t==='why')inner=`${cm}${s.eyebrow?dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow}</div>`):''}${s.headline?dw(`<div class="shl" style="font-size:26px;margin-bottom:14px" contenteditable="true" data-field="headline">${s.headline}</div>`):''}${dw(`<div class="sbd" contenteditable="true" style="margin-bottom:20px" data-field="body">${s.body||''}</div>`)}${dw(gfx(s.graphic||'wave'))}${wm}`;
  else if(t==='exercise')inner=`${cm}${dw(`<div class="set" contenteditable="true" data-field="num">Exercise ${s.num||String(i).padStart(2,'0')}</div>`)}${dw(`<div class="sen" contenteditable="true" data-field="name">${s.name||''}</div>`)}${dw(`<div class="ses" contenteditable="true" data-field="subtitle">${s.subtitle||''}</div>`)}${dw(gfx(s.graphic||'box'))}${wm}`;
  else if(t==='concept')inner=`${cm}${dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow||''}</div>`)}${dw(`<div class="shl" style="font-size:24px" contenteditable="true" data-field="headline">${s.headline||''}</div>`)}${dw(`<div class="srl"></div>`)}${dw(`<div class="sbd" style="margin-top:14px;font-size:12px" contenteditable="true" data-field="body">${s.body||''}</div>`)}${gr}${wm}`;
  else if(t==='quote')inner=`<div class="bgr"></div>${cm}<div class="sqm">"</div>${dw(`<div class="sqt" contenteditable="true" data-field="quote">${s.quote||''}</div>`)}${dw(`<div class="sqa" contenteditable="true" data-field="attribution">${s.attribution||''}</div>`)}${wm}`;
  else if(t==='list'){
    const items=(s.items||['Item one','Item two','Item three']);
    const listHtml=`<div class="sli-wrap">`+items.map((it,ii)=>`<div class="sli"><div class="sli-dot"></div><div class="sli-text" contenteditable="true" data-field="item${ii}">${it}</div></div>`).join('')+`</div>`;
    inner=`${cm}${dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow||''}</div>`)}${dw(listHtml)}${wm}`;
  }
  else if(t==='mockup'){
    const screenContent=s.screenshot
      ?`<img src="${s.screenshot}" alt="App screenshot">`
      :`<div class="phone-screen-empty">Upload your<br>screenshot<br>in the sidebar</div>`;
    inner=`<div class="bgr"></div>${cm}
      <div class="phone-wrap">
        ${s.eyebrow||s.headline?`<div style="text-align:center;padding:0 20px">
          ${s.eyebrow?dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow}</div>`):''}
          ${s.headline?dw(`<div class="shl" style="font-size:24px;margin-bottom:0" contenteditable="true" data-field="headline">${s.headline}</div>`):''}
        </div>`:''}
        <div class="phone-frame">
          <div class="phone-island"></div>
          <div class="phone-screen">${screenContent}</div>
        </div>
        ${s.caption?dw(`<div class="sst" contenteditable="true" data-field="caption">${s.caption}</div>`):''}
      </div>${wm}`;
  }
  else if(t==='cta')inner=`<div class="bgl"></div>${cm}${dw(`<div class="sey" contenteditable="true" data-field="eyebrow">${s.eyebrow||'go deeper'}</div>`)}${dw(`<div class="sch" contenteditable="true" data-field="headline">${s.headline||''}</div>`)}${dw(`<div class="scb" contenteditable="true" data-field="body">${s.body||''}</div>`)}${dw(`<div class="sln" contenteditable="true" data-field="nudge">${s.nudge||'↑ link in bio'}</div>`)}${gr}${wm}`;
  else inner=`${cm}${dw(`<div class="sbd" contenteditable="true" data-field="body">${s.headline||s.body||''}</div>`)}${gr}${wm}`;
  el.innerHTML=inner;
  return el;
}

// ── RENDER ALL SLIDES ──
function render(){
  const cv=document.getElementById('canvas');
  document.getElementById('empty')?.remove();
  cv.querySelectorAll('.sc,.snav,.sct,.qbar-inner').forEach(e=>e.remove());
  const c=document.createElement('div');c.className='sc';
  slides.forEach((s,i)=>{const el=bslide(s,i);if(i===cur)el.classList.add('active');c.appendChild(el);});
  cv.appendChild(c);
  const nav=document.createElement('div');nav.className='snav';
  nav.innerHTML=`<button class="nb" id="pb" onclick="mv(-1)" ${cur===0?'disabled':''}>&#8592;</button><div class="dots" id="dots"></div><button class="nb" id="nb2" onclick="mv(1)" ${cur===slides.length-1?'disabled':''}>&#8594;</button>`;
  cv.appendChild(nav);
  const ct=document.createElement('div');ct.className='sct';ct.id='sct';ct.textContent=`${cur+1} / ${slides.length}`;
  cv.appendChild(ct);
  bdots();
  updateQBar();
}

function updateQBar(){
  const has=slides.length>0;
  document.getElementById('qpb').disabled=cur===0||!has;
  document.getElementById('qnb').disabled=cur===slides.length-1||!has;
  document.getElementById('qup').disabled=cur===0||!has;
  document.getElementById('qdn').disabled=cur===slides.length-1||!has;
  document.getElementById('qdup').disabled=!has;
  document.getElementById('qdel').disabled=slides.length<=1||!has;
  document.getElementById('qct').textContent=has?`${cur+1} / ${slides.length}`:'— / —';
}

// ── BG OPTIONS ──
const BG_OPTIONS=[
  {v:'#111111',l:'Charcoal'},{v:'#0F2F26',l:'Forest'},{v:'#1a4a3a',l:'Forest Light'},
  {v:'#0d1a16',l:'Deep Forest'},{v:'#1a1a1a',l:'Near Black'},{v:'#2a2a2a',l:'Warm Dark'},
  {v:'#6F8A7E',l:'Sage'},{v:'#C9A84C',l:'Gold'},{v:'#F2EFE7',l:'Cream'},{v:'#e8e4db',l:'Cream Dark'},
  {v:'linear-gradient(155deg,#0F2F26,#111111)',l:'Forest → Charcoal'},
  {v:'radial-gradient(ellipse at 50% 60%,#1a4a3a,#111111)',l:'Forest Radial'},
  {v:'linear-gradient(135deg,#0F2F26,#1a4a3a)',l:'Forest Blend'},
  {v:'linear-gradient(180deg,#0F2F26,#111111 65%)',l:'Forest Fade'},
  {v:'linear-gradient(135deg,#1a1205,#111111)',l:'Gold Smoke'},
  {v:'linear-gradient(180deg,#111111,#0F2F26)',l:'Charcoal → Forest'},
];

function bgClick(event,idx){
  const cell=event.target.closest('.bgsw');if(!cell)return;
  const val=cell.dataset.bg;
  slides[idx].bg=val;saveSlides();
  cell.closest('.card-bgstrip').querySelectorAll('.bgsw').forEach(c=>c.classList.remove('sel'));
  cell.classList.add('sel');
  const e=document.getElementById('sl'+idx);
  if(e){
    e.style.background=val;
    if(LIGHT_BGS.includes(val))e.classList.add('light');
    else e.classList.remove('light');
  }
  // update dot in header
  const dot=document.getElementById('bgdot'+idx);
  if(dot)dot.style.background=val;
}

// ── GFX ──
function gfx(t){

// ── SLIDE OPERATIONS ──
function deleteSlide(idx){
  if(slides.length<=1)return;
  slides.splice(idx,1);
  cur=Math.min(cur,slides.length-1);
  saveSlides();render();renderEds();goTo(cur);
}

function hasCTALast(){return slides.length>0&&slides[slides.length-1].type==='cta';}

function duplicateSlide(idx){
  const newSlide=JSON.parse(JSON.stringify(slides[idx]));
  // insert before last if last is CTA and we're not duplicating CTA
  const insertAt=(hasCTALast()&&slides[idx].type!=='cta')?slides.length-1:idx+1;
  slides.splice(insertAt,0,newSlide);
  saveSlides();render();renderEds();goTo(insertAt);
}

function moveSlide(idx,dir){
  const n=idx+dir;if(n<0||n>=slides.length)return;
  // prevent moving a non-CTA slide into the last position if last is CTA
  if(hasCTALast()&&n===slides.length-1&&slides[idx].type!=='cta')return;
  // prevent moving CTA away from last position
  if(slides[idx].type==='cta'&&idx===slides.length-1)return;
  [slides[idx],slides[n]]=[slides[n],slides[idx]];
  cur=n;saveSlides();render();renderEds();goTo(n);
}

function changeType(idx,newType){
  const s=slides[idx];

    hook:{type:'hook',eyebrow:s.eyebrow||'breathwork',headline:s.headline||'Your headline',subtext:s.subtext||'Supporting text'},
    why:{type:'why',eyebrow:s.eyebrow||'',headline:s.headline||'',body:s.body||'Body copy here.',graphic:s.graphic||'wave'},
    exercise:{type:'exercise',num:s.num||'01',name:s.name||'Exercise Name',subtitle:s.subtitle||'Brief description',graphic:s.graphic||'box'},
    concept:{type:'concept',eyebrow:s.eyebrow||'concept',headline:s.headline||'Headline',body:s.body||'Body copy here.',graphic:s.graphic||'none'},
    quote:{type:'quote',quote:s.quote||s.headline||'Your quote here.',attribution:s.attribution||'— Source'},
    list:{type:'list',eyebrow:s.eyebrow||'',items:s.items||['Item one','Item two','Item three']},
    mockup:{type:'mockup',eyebrow:s.eyebrow||'inside velum',headline:s.headline||'',caption:s.caption||'',screenshot:s.screenshot||null},
    cta:{type:'cta',eyebrow:s.eyebrow||'go deeper',headline:s.headline||'Ready to begin?',body:s.body||'Start your practice today.',nudge:'↑ link in bio'},
  };
  slides[idx]={...defs[newType],bg:s.bg};
  saveSlides();render();renderEds();goTo(idx);

  setTimeout(()=>{const card=document.getElementById('card'+idx);if(card)card.classList.add('open');},50);

    list:{type:'list',eyebrow:'',items:['Item one','Item two','Item three']},
    mockup:{type:'mockup',eyebrow:'inside velum',headline:'',caption:'',screenshot:null},
    cta:{type:'cta',eyebrow:'go deeper',headline:'Ready to begin?',body:'Start your practice today.',nudge:'↑ link in bio'},

// ── FORMAT BAR ──
let savedRange=null;
function saveSelection(){const sel=window.getSelection();if(sel&&sel.rangeCount>0)savedRange=sel.getRangeAt(0).cloneRange();}
function restoreAndApply(cmd,val){
  if(!savedRange)return;
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedRange);
  const range=sel.getRangeAt(0);
  if(cmd==='removeFormat'){const text=document.createTextNode(range.toString());range.deleteContents();range.insertNode(text);savedRange=null;return;}
  const span=document.createElement('span');
  if(cmd==='bold')span.style.fontWeight='600';
  else if(cmd==='italic')span.style.fontStyle='italic';
  else if(cmd==='underline')span.style.textDecoration='underline';
  else if(cmd==='foreColor')span.style.color=val;
  else if(cmd==='fontSize')span.style.fontSize=val;
  try{range.surroundContents(span);}catch(e){const x=range.extractContents();span.appendChild(x);range.insertNode(span);}
  savedRange=null;
}
function fmt(cmd,val){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0&&!sel.isCollapsed)savedRange=sel.getRangeAt(0).cloneRange();
  restoreAndApply(cmd,val);
}
function setAlign(align){
  const sel=window.getSelection();if(!sel||!sel.rangeCount)return;
  const ce=sel.anchorNode?.parentElement?.closest('[contenteditable]');
  if(ce)ce.style.textAlign=align;
}
function setFont(font){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount&&!sel.isCollapsed){
    savedRange=sel.getRangeAt(0).cloneRange();
    const span=document.createElement('span');
    span.style.fontFamily=font+','+(font==='Cormorant Garamond'?'serif':'sans-serif');
    try{savedRange.surroundContents(span);}catch(e){const x=savedRange.extractContents();span.appendChild(x);savedRange.insertNode(span);}
  }
}

  await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});

async function dlAll(){
  if(!slides.length){alert('Generate a carousel first.');return;}
  const sc=document.querySelector('#canvas .sc');if(!sc)return;
  const allSlides=sc.querySelectorAll('.slide');
  await loadHtml2Canvas();
  for(let i=0;i<allSlides.length;i++){
    st(`Exporting ${i+1}/${allSlides.length}…`,true);
    const slide=allSlides[i];
    const wasHidden=!slide.classList.contains('active');
    slide.classList.add('active');
    await new Promise(r=>setTimeout(r,80));
    const canvas=await html2canvas(slide,{scale:2,useCORS:true,backgroundColor:'#111111',width:DIMS[curDim].export.w,height:DIMS[curDim].export.h});
    const a=document.createElement('a');a.download=`velum-slide-${String(i+1).padStart(2,'0')}.png`;a.href=canvas.toDataURL('image/png');a.click();
    await new Promise(r=>setTimeout(r,280));
    if(wasHidden)slide.classList.remove('active');
  }
  goTo(cur);st(`${allSlides.length} slides downloaded`,false);
}

  el.innerHTML=CTA_TEMPLATES.map((t,i)=>`
    <button onclick="applyCTATemplate(${i})" style="text-align:left;background:var(--s2);border:1px solid var(--br);border-radius:3px;padding:7px 10px;cursor:pointer;transition:border-color .15s;width:100%" onmouseover="this.style.borderColor='var(--gd)'" onmouseout="this.style.borderColor='var(--br)'">
      <div style="font-size:9px;color:var(--gd);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">${t.label}</div>
      <div style="font-size:10px;color:var(--dm);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.nudge}</div>
    </button>`).join('');
}

function applyCTATemplate(idx){
  const t=CTA_TEMPLATES[idx];
  // find last CTA slide or last slide
  let target=slides.length-1;
  if(slides.length&&slides[slides.length-1].type!=='cta'){
    // add a CTA slide at the end
    slides.push({type:'cta',eyebrow:t.eyebrow,headline:t.headline,body:t.body,nudge:t.nudge});
    saveSlides();render();renderEds();goTo(slides.length-1);
    st(`CTA template applied — edit the [PLACEHOLDERS] in the slide`,false);
    return;
  }
  // update existing last CTA
  slides[target]={...slides[target],eyebrow:t.eyebrow,headline:t.headline,body:t.body,nudge:t.nudge};
  saveSlides();
  const e=document.getElementById('sl'+target);
  if(e){const n=bslide(slides[target],target);n.id='sl'+target;if(e.classList.contains('active'))n.classList.add('active');e.replaceWith(n);}
  renderEds();goTo(target);
  st(`CTA template applied — edit the [PLACEHOLDERS] in the slide`,false);
}

// ── SESSIONS ──
function saveSession(){
  const name=document.getElementById('sess-name').value.trim();
  if(!name||!slides.length)return;
  const all=JSON.parse(localStorage.getItem('velum_sessions')||'{}');
  all[name]={slides,cur,saved:new Date().toLocaleDateString()};
  localStorage.setItem('velum_sessions',JSON.stringify(all));
  loadSessionList();st(`"${name}" saved`,false);
}
function loadSession(){
  const name=document.getElementById('sess-load').value;if(!name)return;
  const all=JSON.parse(localStorage.getItem('velum_sessions')||'{}');
  if(!all[name])return;
  slides=all[name].slides;cur=all[name].cur||0;
  saveSlides();render();renderEds();goTo(cur);st(`Loaded "${name}"`,false);
}
function deleteSession(){
  const name=document.getElementById('sess-load').value;if(!name)return;
  const all=JSON.parse(localStorage.getItem('velum_sessions')||'{}');
  delete all[name];localStorage.setItem('velum_sessions',JSON.stringify(all));loadSessionList();
}
function loadSessionList(){
  const sel=document.getElementById('sess-load');if(!sel)return;
  const all=JSON.parse(localStorage.getItem('velum_sessions')||'{}');
  sel.innerHTML='<option value="">Load…</option>'+Object.keys(all).map(k=>`<option value="${k}">${k} (${all[k].saved||''})</option>`).join('');
}

// ── DRAG TO REPOSITION ──
const _drag={el:null,slide:null,ox:0,oy:0,guides:null};
const SNAP_T=18;
function _getGuides(slide){
  if(!slide._guides){
    const gh=[],gv=[];
    [[0,'t'],[120,'q1'],[240,'mid'],[360,'q3'],[480,'b']].forEach(([y])=>{const d=document.createElement('div');d.className='snap-guide h';d.style.top=y+'px';d.dataset.pos=y;slide.appendChild(d);gh.push(d);});
    [[0,'l'],[160,'t1'],[240,'ctr'],[320,'t2'],[480,'r']].forEach(([x])=>{const d=document.createElement('div');d.className='snap-guide v';d.style.left=x+'px';d.dataset.pos=x;slide.appendChild(d);gv.push(d);});
    slide._guides={h:gh,v:gv};
  }
  return slide._guides;
}
function _snap(val,elSize,positions,guides){
  let best=null,bestD=SNAP_T;
  positions.forEach(p=>{[[p,p],[p-elSize/2,p],[p-elSize,p]].forEach(([sv,gp])=>{const d=Math.abs(val-sv);if(d<bestD){bestD=d;best={sv,gp};}});});
  guides.forEach(g=>{const gp=parseFloat(g.dataset.pos);g.classList.toggle('show',!!(best&&best.gp===gp));});
  return best?best.sv:val;
}
document.addEventListener('mousedown',e=>{
  const dh=e.target.closest('.dh');if(!dh)return;
  e.preventDefault();e.stopPropagation();
  const dw=dh.closest('.dw');const slide=dh.closest('.slide');if(!dw||!slide)return;
  const sr=slide.getBoundingClientRect();const wr=dw.getBoundingClientRect();
  if(dw.style.position!=='absolute'){dw.style.position='absolute';dw.style.left=(wr.left-sr.left)+'px';dw.style.top=(wr.top-sr.top)+'px';slide.appendChild(dw);}
  dw.classList.add('is-dragging');_drag.el=dw;_drag.slide=slide;_drag.guides=_getGuides(slide);
  _drag.ox=e.clientX-parseFloat(dw.style.left||0)-sr.left;_drag.oy=e.clientY-parseFloat(dw.style.top||0)-sr.top;
},true);
document.addEventListener('mousemove',e=>{
  if(!_drag.el)return;
  const sr=_drag.slide.getBoundingClientRect();
  const rawX=e.clientX-sr.left-_drag.ox,rawY=e.clientY-sr.top-_drag.oy;
  const wr=_drag.el.getBoundingClientRect();
  _drag.el.style.left=_snap(rawX,wr.width,[0,160,240,320,480],_drag.guides.v)+'px';
  _drag.el.style.top=_snap(rawY,wr.height,[0,120,240,360,480],_drag.guides.h)+'px';
});
document.addEventListener('mouseup',()=>{
  if(!_drag.el)return;
  _drag.el.classList.remove('is-dragging');
  if(_drag.guides)[..._drag.guides.h,..._drag.guides.v].forEach(g=>g.classList.remove('show'));
  _drag.el=null;_drag.slide=null;_drag.guides=null;
});

// Save contenteditable edits to slides[]
let _saveTimer=null;
document.addEventListener('input',e=>{
  const ce=e.target.closest('[data-field]');if(!ce)return;
  const slide=ce.closest('.slide');if(!slide)return;
  const idx=parseInt(slide.id.replace('sl',''));if(isNaN(idx)||!slides[idx])return;
  slides[idx][ce.dataset.field]=ce.innerHTML;
  clearTimeout(_saveTimer);_saveTimer=setTimeout(saveSlides,400);
},true);

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'||e.target.isContentEditable)return;
  if(e.key==='ArrowRight')mv(1);if(e.key==='ArrowLeft')mv(-1);
});
</script>
